<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Webkassa</title>
  <link rel="stylesheet" href="styles/main.css"/>
  <script src="script/main.js" type="module" defer></script>
</head>
<body>
<header class="header">
  <div class="header__body container">
    <div>
      <a
        class="header__logo logo"
        href="/"
        aria-label="Home"
        title="Home"
      >
        <img
          class="logo__image"
          src="images/logo.svg"
          alt=""
          width="78" height="60" loading="lazy"
        />
      </a>
      <nav class="header__menu">
        <ul class="header__menu-list">
          <li class="header__menu-item">
            <a class="header__menu-link" href="/">Тарифы</a>
          </li>
          <li class="header__menu-item">
            <a class="header__menu-link" href="/">Блог</a>
          </li>
          <li class="header__menu-item">
            <a class="header__menu-link" href="/">Вакансии</a>
          </li>
          <li class="header__menu-item">
            <a class="header__menu-link" href="/">Контакты</a>
          </li>
        </ul>
      </nav>
    </div>
    <div class="header__right">
      <div class="header__actions">
        <ul class="header__socials socials">
          <li class="socials__item">
            <a class="socials__link" href="#" target="_blank" rel="noopener noreferrer" aria-label="Telegram">
              <img src="./icons/telegram.svg" alt="" width="21" height="18">
            </a>
          </li>
          <li class="socials__item">
            <a class="socials__link" href="#" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp">
              <img src="./icons/whatsapp.svg" alt="" width="21" height="18">
            </a>
          </li>
          <li class="socials__item">
            <a class="socials__link" href="#" target="_blank" rel="noopener noreferrer" aria-label="VK">
              <img src="./icons/vk.svg" alt="" width="21" height="18">
            </a>
          </li>
        </ul>
      </div>
      <div class="header__buttons">
        <a class="button button--primary" href="/">Подключиться</a>
        <a class="button button--secondary" href="/">Личный кабинет</a>
      </div>
      <button
        class="header__burger-button burger-button"
        type="button"
        aria-label="Open menu"
        title="Open menu"
      >
        <span class="button__line"></span>
        <span class="button__line"></span>
        <span class="button__line"></span>
      </button>
    </div>
  </div>
</header>
</body>
</html>
